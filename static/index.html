<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Sim — AI Invoice Review Training</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<div id="app" x-data="app()" x-cloak>

  <!-- ─── ROLE SELECTION ──────────────────────────────────────────────────── -->
  <div x-show="view === 'home'" class="role-page">
    <h1>📊 Finance Sim</h1>
    <p>AI-powered training platform for analyst skill development</p>
    <div class="role-cards">
      <div class="role-card" @click="navigate('instructor')">
        <div class="role-icon">🏫</div>
        <h2>Instructor</h2>
        <p>Build scenarios, upload documents, set answer keys, use AI to design modules</p>
      </div>
      <div class="role-card" @click="navigate('learner')">
        <div class="role-icon">📋</div>
        <h2>Learner</h2>
        <p>Review documents using AI assistance and submit decisions</p>
      </div>
    </div>
  </div>

  <!-- ─── INSTRUCTOR DASHBOARD ──────────────────────────────────────────── -->
  <template x-if="view === 'instructor'">
    <div class="page">
      <nav class="navbar">
        <span class="navbar-brand"><span class="icon">📊</span> Finance Sim</span>
        <div class="navbar-links">
          <button @click="navigate('home')">← Back</button>
        </div>
      </nav>
      <div class="container" style="padding-top:24px">
        <div class="dashboard-header">
          <h2>🏫 Instructor Dashboard</h2>
          <button class="btn btn-primary" @click="openNewScenarioModal()">+ New Scenario</button>
        </div>
        <div x-show="instructorScenarios.length === 0" class="empty-state">
          <div class="icon">📁</div>
          <p>No scenarios yet. Create your first one!</p>
        </div>
        <div class="scenario-list">
          <template x-for="sc in instructorScenarios" :key="sc.id">
            <div class="scenario-item">
              <div>
                <h3 x-text="sc.title"></h3>
                <p x-text="sc.description || 'No description'"></p>
              </div>
              <div style="display:flex;align-items:center;gap:12px">
                <span class="badge" :class="'badge-' + sc.status" x-text="sc.status"></span>
                <div class="scenario-actions">
                  <button class="btn btn-outline btn-sm" @click="editScenario(sc.id)">✏️ Edit</button>
                  <button class="btn btn-outline btn-sm" @click="togglePublish(sc)">
                    <span x-text="sc.status === 'published' ? '⬇️ Unpublish' : '🚀 Publish'"></span>
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Template selector modal -->
      <template x-if="showTemplateModal">
        <div class="modal-overlay" @click.self="showTemplateModal = false">
          <div class="modal-card">
            <h3 style="margin-bottom:8px">📋 New Scenario</h3>
            <p style="font-size:13px;color:#64748b;margin-bottom:20px">Choose how to get started:</p>
            <div style="display:flex;flex-direction:column;gap:10px">
              <button class="template-btn" @click="createScenario(null)">
                <span style="font-size:20px">🤖</span>
                <div>
                  <div style="font-weight:700">Start with AI guidance</div>
                  <div style="font-size:12px;color:#64748b">The AI Design Assistant will guide you through building your module step by step</div>
                </div>
              </button>
              <button class="template-btn" @click="createScenario('billing')">
                <span style="font-size:20px">🧾</span>
                <div>
                  <div style="font-weight:700">Billing Reconciliation</div>
                  <div style="font-size:12px;color:#64748b">Invoice review — Approve or Flag with error categories</div>
                </div>
              </button>
              <button class="template-btn" @click="createScenario('fraud')">
                <span style="font-size:20px">🕵️</span>
                <div>
                  <div style="font-weight:700">Timesheet Fraud Detection</div>
                  <div style="font-size:12px;color:#64748b">Timesheet review — Legitimate / Suspicious / Escalate</div>
                </div>
              </button>
            </div>
            <button class="btn btn-outline" style="margin-top:16px;width:100%" @click="showTemplateModal = false">Cancel</button>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- ─── SCENARIO EDITOR ───────────────────────────────────────────────── -->
  <template x-if="view === 'editor'">
    <div class="page" style="display:flex;flex-direction:column;height:100vh">
      <nav class="navbar">
        <span class="navbar-brand"><span class="icon">📊</span> Finance Sim</span>
        <div class="navbar-links">
          <button @click="navigate('instructor')">← Dashboard</button>
        </div>
      </nav>
      <div class="editor-page">

        <!-- ── Left/Main: Scenario form ────────────────────────────────── -->
        <div class="editor-main">
          <h2 style="margin-bottom:16px">✏️ Edit Scenario</h2>
          <div x-show="editorError" class="error-banner" x-text="editorError"></div>

          <!-- Scenario metadata -->
          <div class="card" style="margin-bottom:16px">
            <div class="form-group">
              <label>Title</label>
              <input class="form-control" type="text" x-model="editData.title" placeholder="Scenario title" />
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea class="form-control" x-model="editData.description" placeholder="Describe the scenario for learners..."></textarea>
            </div>
            <div style="display:flex;gap:10px">
              <button class="btn btn-outline" @click="saveScenario('draft')">💾 Save Draft</button>
              <button class="btn btn-success" @click="saveScenario('published')">🚀 Publish</button>
            </div>
          </div>

          <!-- Domain settings (from scenario_config) -->
          <div class="card" style="margin-bottom:16px">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">⚙️ Domain Settings</h3>
            <div class="form-group">
              <label>Domain Name</label>
              <input class="form-control" type="text" :value="editConfig.domain || ''"
                @input="editConfig = { ...editConfig, domain: $event.target.value }"
                placeholder="e.g. Accounts Payable Review, Timesheet Fraud Detection" />
            </div>
            <div class="form-group">
              <label>Primary Document Type Label</label>
              <input class="form-control" type="text" :value="editConfig.primary_doc_type_label || ''"
                @input="editConfig = { ...editConfig, primary_doc_type_label: $event.target.value }"
                placeholder="e.g. Invoice Documents, Timesheet Records, Expense Reports" />
            </div>
            <div class="form-group">
              <label>Reference Document Type Label</label>
              <input class="form-control" type="text" :value="editConfig.reference_doc_type_label || ''"
                @input="editConfig = { ...editConfig, reference_doc_type_label: $event.target.value }"
                placeholder="e.g. Reference Documents, Policy & Rate Documents" />
            </div>
            <div class="form-group">
              <label>Learner AI Assistant Persona <span style="font-size:11px;color:#94a3b8">(system prompt)</span></label>
              <textarea class="form-control" style="min-height:80px;font-size:12px;font-family:monospace"
                :value="editConfig.agent_persona || ''"
                @input="editConfig = { ...editConfig, agent_persona: $event.target.value }"
                placeholder="Describe the AI assistant's role and behavior for learners using this scenario. The AI Design Assistant can help you draft this."></textarea>
            </div>
            <div style="font-size:11px;color:#94a3b8">💡 Ask the AI Design Assistant to help configure these settings for your domain.</div>
          </div>

          <!-- Document Upload -->
          <div class="editor-layout">
            <div class="card">
              <h3 style="font-size:15px;font-weight:700;margin-bottom:12px"
                x-text="'📄 ' + (resolvedConfig.primary_doc_type_label || 'Primary Documents')"></h3>
              <div class="upload-zone"
                @click="triggerUpload('primary')"
                @dragover.prevent="$el.classList.add('drag-over')"
                @dragleave="$el.classList.remove('drag-over')"
                @drop.prevent="handleFileDrop($event, 'primary')">
                <p>Drop files here or click to upload</p>
                <p style="font-size:11px;margin-top:4px">PDF or CSV</p>
              </div>
              <input type="file" id="primaryFileInput" multiple accept=".pdf,.csv" style="display:none"
                @change="handleFileInput($event, 'primary')" />
              <div style="margin-top:10px">
                <template x-for="doc in editDocs.filter(d => d.doc_type === 'primary' || d.doc_type === 'invoice')" :key="doc.id">
                  <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9">
                    <span style="font-size:16px">📄</span>
                    <span style="flex:1;font-size:13px" x-text="doc.display_name || doc.filename"></span>
                    <button class="btn btn-danger btn-sm" @click="deleteDoc(doc.id)">✕</button>
                  </div>
                </template>
              </div>
            </div>

            <div class="card">
              <h3 style="font-size:15px;font-weight:700;margin-bottom:12px"
                x-text="'📎 ' + (resolvedConfig.reference_doc_type_label || 'Reference Documents')"></h3>
              <div class="upload-zone"
                @click="triggerUpload('reference')"
                @dragover.prevent="$el.classList.add('drag-over')"
                @dragleave="$el.classList.remove('drag-over')"
                @drop.prevent="handleFileDrop($event, 'reference')">
                <p>Drop reference files here or click to upload</p>
                <p style="font-size:11px;margin-top:4px">Contract, rate card, policy, etc.</p>
              </div>
              <input type="file" id="referenceFileInput" multiple accept=".pdf,.csv" style="display:none"
                @change="handleFileInput($event, 'reference')" />
              <div style="margin-top:10px">
                <template x-for="doc in editDocs.filter(d => d.doc_type === 'reference')" :key="doc.id">
                  <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9">
                    <span style="font-size:16px">📎</span>
                    <span style="flex:1;font-size:13px" x-text="doc.display_name || doc.filename"></span>
                    <button class="btn btn-danger btn-sm" @click="deleteDoc(doc.id)">✕</button>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Answer Key / Rubric -->
          <div class="card" style="margin-top:16px">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">🔑 Answer Key (Rubric)</h3>
            <p style="font-size:12px;color:#64748b;margin-bottom:12px">Set the correct action for each primary document.</p>
            <table class="rubric-table" x-show="editDocs.filter(d => d.doc_type === 'primary' || d.doc_type === 'invoice').length > 0">
              <thead>
                <tr>
                  <th x-text="resolvedConfig.primary_doc_type_label || 'Document'"></th>
                  <th>Correct Action</th>
                  <th>Error Description</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="doc in editDocs.filter(d => d.doc_type === 'primary' || d.doc_type === 'invoice')" :key="doc.id">
                  <tr>
                    <td x-text="doc.display_name || doc.filename" style="font-size:12px"></td>
                    <td>
                      <select class="rubric-action-select" x-model="rubricEntries[doc.id].action">
                        <option value="">-- select --</option>
                        <template x-for="opt in resolvedConfig.decision_options" :key="opt.value">
                          <option :value="opt.value" x-text="opt.label"></option>
                        </template>
                      </select>
                    </td>
                    <td>
                      <input type="text" class="form-control" style="font-size:12px;padding:4px 8px"
                        x-model="rubricEntries[doc.id].error_description"
                        placeholder="Describe the error (if applicable)" />
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            <div x-show="editDocs.filter(d => d.doc_type === 'primary' || d.doc_type === 'invoice').length === 0" class="empty-state">
              <p>Upload primary documents to configure the answer key.</p>
            </div>
            <div style="margin-top:12px">
              <button class="btn btn-primary" @click="saveRubric()">💾 Save Answer Key</button>
            </div>
          </div>
        </div>

        <!-- ── Right: AI Design Assistant ───────────────────────────────── -->
        <div class="editor-ai-panel">
          <div class="chat-header">
            <h3>🤖 AI Design Assistant</h3>
            <p style="font-size:11px;color:#94a3b8;margin-top:2px">Train-the-trainer coaching — guides you through building this module step by step</p>
          </div>

          <!-- Chat messages -->
          <div class="chat-messages" x-ref="instructorChatMessages">
            <template x-if="instructorChatMessages.length === 0">
              <div style="color:#94a3b8;font-size:12px;text-align:center;padding:16px;line-height:1.6">
                👋 The AI Design Assistant is ready to help.<br>
                Send a message to start — it will guide you through defining your domain, generating mock data, building the rubric, and writing the learner AI persona.
              </div>
            </template>
            <template x-for="msg in instructorChatMessages" :key="msg.id">
              <div class="chat-msg" :class="msg.role" x-text="msg.content"></div>
            </template>
            <div x-show="instructorAiTyping" class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>

          <!-- Input area -->
          <div class="chat-input-area">
            <textarea x-model="instructorChatInput"
              placeholder="Ask the AI to help design your scenario..."
              @keydown.enter.exact.prevent="sendInstructorChat()"
              rows="2"></textarea>
            <button class="chat-send-btn" :disabled="!instructorChatInput.trim() || instructorAiTyping"
              @click="sendInstructorChat()">➤</button>
          </div>
        </div>

      </div>
    </div>
  </template>

  <!-- ─── LEARNER DASHBOARD ─────────────────────────────────────────────── -->
  <template x-if="view === 'learner'">
    <div class="page">
      <nav class="navbar">
        <span class="navbar-brand"><span class="icon">📊</span> Finance Sim</span>
        <div class="navbar-links">
          <button @click="navigate('home')">← Back</button>
        </div>
      </nav>
      <div class="container" style="padding-top:24px">
        <div class="dashboard-header">
          <h2>📋 Learner Dashboard</h2>
        </div>
        <div x-show="learnerScenarios.length === 0" class="empty-state">
          <div class="icon">📭</div>
          <p>No published scenarios available. Check back later!</p>
        </div>
        <div class="scenario-list">
          <template x-for="sc in learnerScenarios" :key="sc.id">
            <div class="scenario-item">
              <div>
                <h3 x-text="sc.title"></h3>
                <p x-text="sc.description || 'No description'"></p>
              </div>
              <div class="scenario-actions">
                <button class="btn btn-primary" @click="startSession(sc.id)">▶️ Start</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>

  <!-- ─── WORKSPACE (session) ───────────────────────────────────────────── -->
  <template x-if="view === 'session'">
    <div class="page" style="display:flex;flex-direction:column;height:100vh">
      <nav class="navbar">
        <span class="navbar-brand"><span class="icon">📊</span> Finance Sim</span>
        <div class="navbar-links">
          <span style="color:#94a3b8;font-size:12px" x-text="sessionScenarioTitle"></span>
          <button @click="navigate('learner')">✕ Exit</button>
        </div>
      </nav>

      <div class="workspace">

        <!-- ── Left Panel: Invoice List ──────────────────────────────────── -->
        <div class="panel-left">
          <div class="panel-left-header">
            <div class="timer" x-text="timerDisplay"></div>
            <div class="progress-bar-wrap">
              <div class="progress-bar" :style="`width: ${progressPct}%`"></div>
            </div>
            <div class="progress-label" x-text="`${decisionsCount} / ${primaryDocCount} reviewed`"></div>
          </div>

          <div class="panel-left-scroll">
            <!-- Primary document list -->
            <div class="section-toggle">📄 <span x-text="primaryDocLabel"></span></div>
            <template x-for="doc in primaryDocs" :key="doc.id">
              <div class="invoice-item"
                :class="{ active: activeDocId === doc.id }"
                draggable="true"
                @dragstart="dragDoc($event, doc)"
                @click="openDoc(doc)">
                <span class="invoice-status" x-text="decisionIcon(doc.id)"></span>
                <span x-text="doc.display_name || doc.filename"></span>
              </div>
            </template>

            <!-- Reference documents -->
            <div style="margin-top:8px">
              <div class="section-toggle" @click="showRefs = !showRefs">
                <span x-text="showRefs ? '▾' : '▸'"></span>
                📎 Reference Docs
              </div>
              <template x-if="showRefs">
                <div>
                  <template x-for="doc in referenceDocs" :key="doc.id">
                    <div class="ref-doc-item"
                      draggable="true"
                      @dragstart="dragDoc($event, doc)"
                      @click="openDoc(doc)">
                      <span>📎</span>
                      <span x-text="doc.display_name || doc.filename"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <div class="panel-left-footer">
            <button class="btn btn-success" style="width:100%"
              :disabled="!allDecided"
              @click="submitSession()">
              ✅ Submit All
            </button>
            <p x-show="!allDecided" style="font-size:11px;color:#94a3b8;text-align:center;margin-top:4px">
              Review all documents to submit
            </p>
          </div>
        </div>

        <!-- ── Center Panel: Document Viewer ────────────────────────────── -->
        <div class="panel-center">
          <!-- Tab bar -->
          <div class="tab-bar">
            <template x-for="tab in openTabs" :key="tab.id">
              <div class="tab" :class="{ active: activeDocId === tab.id }" @click="activeDocId = tab.id">
                <span x-text="tab.filename.endsWith('.pdf') ? '📄' : '📊'"></span>
                <span x-text="shortName(tab.display_name || tab.filename)"></span>
                <span class="tab-close" @click.stop="closeTab(tab.id)">×</span>
              </div>
            </template>
          </div>

          <!-- Viewer area -->
          <div class="doc-viewer">
            <template x-if="activeDoc && activeDoc.filename.toLowerCase().endsWith('.pdf')">
              <iframe :src="`/api/documents/${activeDoc.id}/content`" title="PDF viewer"></iframe>
            </template>
            <template x-if="activeDoc && !activeDoc.filename.toLowerCase().endsWith('.pdf')">
              <div class="csv-viewer">
                <div x-show="csvLoading" class="loading">Loading...</div>
                <table class="csv-table" x-show="!csvLoading && csvRows.length > 0">
                  <thead>
                    <tr>
                      <template x-for="(header, i) in csvRows[0]" :key="i">
                        <th x-text="header"></th>
                      </template>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="(row, ri) in csvRows.slice(1)" :key="ri">
                      <tr>
                        <template x-for="(cell, ci) in row" :key="ci">
                          <td x-text="cell"></td>
                        </template>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>
            <template x-if="!activeDoc">
              <div class="doc-empty">
                <div class="icon">📂</div>
                <p x-text="'Select a document from the left panel'"></p>
              </div>
            </template>
          </div>

          <!-- Decision bar (only for primary docs) -->
          <template x-if="activeDoc && activeDocIsPrimary">
            <div class="decision-bar">
              <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">
                Your Decision
              </div>
              <div class="decision-controls">
                <div class="action-toggle">
                  <template x-for="(opt, idx) in sessionDecisionOptions" :key="opt.value">
                    <button class="action-btn"
                      :class="{ active: currentDecision.action === opt.value, approve: idx === 0, flag: idx > 0 }"
                      @click="setAction(opt.value)"
                      x-text="opt.label"></button>
                  </template>
                </div>
                <div class="decision-fields" x-show="currentDecision.action">
                  <select x-model="currentDecision.error_category"
                    x-show="sessionErrorCategories.length > 0">
                    <option value="">Error category...</option>
                    <template x-for="cat in sessionErrorCategories" :key="cat.value">
                      <option :value="cat.value" x-text="cat.label"></option>
                    </template>
                  </select>
                  <textarea x-model="currentDecision.notes" placeholder="Notes (optional)..." rows="2"></textarea>
                  <button class="btn btn-primary btn-sm" @click="saveDecision()">Save</button>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- ── Right Panel: AI Chat ──────────────────────────────────────── -->
        <div class="panel-right">
          <div class="chat-header">
            <h3>🤖 AI Assistant</h3>
            <p>Ask about invoices. Drag documents from the left panel to attach them.</p>
          </div>

          <!-- API key warning banner -->
          <div x-show="apiKeyMissing"
               style="background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#92400e;line-height:1.5">
            ⚠️ <strong>AI chat is unavailable</strong> — the <code>ANTHROPIC_API_KEY</code> secret is not configured.<br>
            In GitHub Codespaces: go to
            <strong>github.com/settings/codespaces → Secrets</strong>, add <code>ANTHROPIC_API_KEY</code>
            and grant this repository access, then stop and restart the codespace.
          </div>

          <!-- Drop zone for attached documents -->
          <div class="drop-zone"
            @dragover.prevent="$el.classList.add('drag-over')"
            @dragleave="$el.classList.remove('drag-over')"
            @drop.prevent="attachDoc($event)">
            <template x-if="attachedDocs.length === 0">
              <span>Drop documents here to attach to your question</span>
            </template>
            <template x-for="doc in attachedDocs" :key="doc.id">
              <span class="doc-pill">
                📄 <span x-text="shortName(doc.filename)"></span>
                <button @click="removeAttached(doc.id)">×</button>
              </span>
            </template>
          </div>

          <!-- Chat messages -->
          <div class="chat-messages" x-ref="chatMessages">
            <template x-if="chatMessages.length === 0">
              <div style="color:#94a3b8;font-size:12px;text-align:center;padding:16px">
                No messages yet. Ask the AI a question!
              </div>
            </template>
            <template x-for="msg in chatMessages" :key="msg.id">
              <div class="chat-msg" :class="msg.role" x-text="msg.content"></div>
            </template>
            <div x-show="aiTyping" class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>

          <!-- Input area -->
          <div class="chat-input-area">
            <textarea x-model="chatInput" placeholder="Ask the AI about an invoice..."
              @keydown.enter.exact.prevent="sendChat()"
              rows="2"></textarea>
            <button class="chat-send-btn" :disabled="!chatInput.trim() || aiTyping" @click="sendChat()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ─── RESULTS PAGE ──────────────────────────────────────────────────── -->
  <template x-if="view === 'results'">
    <div class="page">
      <nav class="navbar">
        <span class="navbar-brand"><span class="icon">📊</span> Finance Sim</span>
      </nav>
      <div class="results-page">
        <div class="results-hero">
          <div class="accuracy-display"
            :class="{
              excellent: results.accuracy >= 90,
              good: results.accuracy >= 70 && results.accuracy < 90,
              'needs-work': results.accuracy >= 50 && results.accuracy < 70,
              poor: results.accuracy < 50
            }"
            x-text="`${results.accuracy}%`"></div>
          <h2>Accuracy</h2>
          <div class="results-meta">
            <span x-text="`✅ ${results.score_correct} / ${results.score_total} correct`"></span>
            <span x-text="results.elapsed_seconds ? `⏱ ${formatTime(results.elapsed_seconds)}` : ''"></span>
          </div>
        </div>

        <h3 style="margin-bottom:12px" x-text="resultsDocLabel + ' Breakdown'"></h3>
        <table class="results-table">
          <thead>
            <tr>
              <th x-text="resultsDocLabel"></th>
              <th>Your Decision</th>
              <th>Correct</th>
              <th>Result</th>
              <th>Error</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in results.breakdown" :key="item.document_id">
              <tr>
                <td x-text="item.document_name"></td>
                <td x-text="decisionLabel(item.learner_action)"></td>
                <td x-text="decisionLabel(item.correct_action)"></td>
                <td>
                  <span :class="item.is_correct ? 'result-correct' : 'result-incorrect'"
                    x-text="item.is_correct ? '✓ Correct' : '✗ Wrong'"></span>
                </td>
                <td style="font-size:12px;color:#64748b" x-text="item.error_description || '—'"></td>
              </tr>
            </template>
          </tbody>
        </table>

        <div class="results-actions">
          <button class="btn btn-outline" @click="viewChatLog()">💬 Review AI Chat</button>
          <button class="btn btn-primary" @click="navigate('learner')">▶️ Try Another</button>
        </div>

        <!-- Chat log modal area -->
        <template x-if="showChatLog">
          <div style="margin-top:32px">
            <h3 style="margin-bottom:12px">💬 AI Chat Log</h3>
            <div style="background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.07)">
              <template x-if="chatLogMessages.length === 0">
                <p style="color:#94a3b8;text-align:center">No chat messages in this session.</p>
              </template>
              <div style="display:flex;flex-direction:column;gap:10px">
                <template x-for="msg in chatLogMessages" :key="msg.id">
                  <div style="display:flex;gap:8px;align-items:flex-start">
                    <span style="font-size:18px" x-text="msg.role === 'user' ? '👤' : '🤖'"></span>
                    <div>
                      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:2px"
                        x-text="msg.role === 'user' ? 'You' : 'AI Assistant'"></div>
                      <div style="font-size:13px;white-space:pre-wrap" x-text="msg.content"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

</div>

<!-- app.js must be deferred and listed BEFORE Alpine so it always runs first.
     Both scripts are deferred: they download in parallel then execute in order
     after HTML parsing, guaranteeing window.app() is defined before Alpine starts. -->
<script src="/app.js" defer></script>
<script src="/vendor/alpine.js" defer></script>

<!-- Alpine initialization guard: if Alpine hasn't started within the timeout, show an error.
     This catches CDN failures, npm install issues, or browser caching of old code. -->
<script>
  window.addEventListener('load', function () {
    var ALPINE_INIT_TIMEOUT_MS = 4000; // generous timeout for slow connections
    setTimeout(function () {
      var appEl = document.getElementById('app');
      if (appEl && appEl.hasAttribute('x-cloak')) {
        // x-cloak is still present → Alpine never initialized
        appEl.removeAttribute('x-cloak'); // reveal the page anyway
        var banner = document.createElement('div');
        banner.style.cssText = [
          'position:fixed;top:0;left:0;right:0;z-index:9999',
          'background:#dc2626;color:#fff;padding:14px 20px',
          'font-family:sans-serif;font-size:14px;line-height:1.5',
          'display:flex;align-items:center;gap:12px',
        ].join(';');
        banner.innerHTML = [
          '<span style="font-size:20px">⚠️</span>',
          '<span>',
          '<strong>UI framework failed to load — buttons will not work.</strong><br>',
          'Try: hard-refresh the page (Ctrl+Shift+R / Cmd+Shift+R), ',
          'or restart the server and reload.',
          '</span>',
        ].join('');
        document.body.prepend(banner);
      }
    }, ALPINE_INIT_TIMEOUT_MS);
  });
</script>
</body>
</html>
